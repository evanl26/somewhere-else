<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unhurried</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&family=EB+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #1a1814; --muted: #8a8680; --subtle: #e8e5e0; --bg: #f7f5f2; --white: #ffffff; --accent: #c8a96e; }
  body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  header { padding: 4rem 2.5rem 3rem; border-bottom: 0.5px solid var(--subtle); }
  .site-name { font-family: "Cormorant Garamond", serif; font-size: clamp(3rem, 10vw, 7rem); font-weight: 300; font-style: italic; letter-spacing: -0.01em; color: var(--ink); line-height: 1.2; display: block; margin-bottom: 1.5rem; transform: skewX(-8deg); display: inline-block; }
  .header-bottom { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .site-tagline { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 300; }
  .site-quote { font-family: "Cormorant Garamond", serif; font-size: 1rem; font-style: italic; color: var(--muted); font-weight: 300; max-width: 340px; line-height: 1.5; }

  .grid-section { padding: 2rem 2.5rem; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  @media (max-width: 600px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } .grid-item.wide { grid-column: span 1; aspect-ratio: 1; } .grid-item.tall { grid-row: span 1; aspect-ratio: 1; } }
  .grid-item { overflow: hidden; cursor: pointer; position: relative; aspect-ratio: 1; opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .grid-item.revealed { opacity: 1; transform: translateY(0); }
  .grid-item.wide { grid-column: span 2; aspect-ratio: 16/9; }
  .grid-item.tall { grid-row: span 2; aspect-ratio: unset; }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; filter: saturate(0.9); }
  .grid-item:hover img { transform: scale(1.04); filter: saturate(1.05); }

  /* Floating AI Widget */
  .ai-widget { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200; }
  .ai-bubble { width: 52px; height: 52px; background: var(--ink); border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(26,24,20,0.22); transition: background 0.2s ease, transform 0.2s ease; }
  .ai-bubble:hover { background: var(--accent); transform: scale(1.05); }
  .ai-bubble svg { width: 20px; height: 20px; fill: none; stroke: var(--white); stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .ai-panel { position: absolute; bottom: 64px; right: 0; width: 300px; background: var(--white); border-radius: 16px; box-shadow: 0 8px 40px rgba(26,24,20,0.16); padding: 1.2rem; opacity: 0; pointer-events: none; transform: translateY(10px) scale(0.96); transform-origin: bottom right; transition: opacity 0.22s ease, transform 0.22s ease; }
  .ai-widget:hover .ai-panel { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
  .ai-widget.open .ai-panel { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
  @media (hover: none) { .ai-widget:hover .ai-panel { opacity: 0; pointer-events: none; transform: translateY(10px) scale(0.96); } }
  .ai-panel-label { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.9rem; }
  .ai-input-row { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--ink); padding-bottom: 0.4rem; margin-bottom: 0.9rem; }
  .ai-input { flex: 1; border: none; background: transparent; padding: 0.25rem 0; font-family: "Cormorant Garamond", serif; font-size: 1rem; font-style: italic; color: var(--ink); outline: none; }
  .ai-input::placeholder { color: var(--muted); font-style: italic; }
  .ai-submit { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.1rem; padding: 0; line-height: 1; transition: color 0.2s; }
  .ai-submit:hover { color: var(--ink); } .ai-submit:disabled { opacity: 0.3; cursor: not-allowed; }
  .ai-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.8rem; }
  .ai-pill { font-size: 0.78rem; padding: 3px 10px; border: 0.5px solid var(--subtle); color: var(--muted); cursor: pointer; font-family: "Cormorant Garamond", serif; font-style: italic; border-radius: 20px; background: none; transition: border-color 0.2s, color 0.2s; }
  .ai-pill:hover { border-color: var(--ink); color: var(--ink); }
  .ai-loading { font-family: "Cormorant Garamond", serif; font-style: italic; color: var(--muted); font-size: 0.85rem; display: none; margin-bottom: 0.5rem; }
  .ai-loading.visible { display: block; }
  .ai-narrative { font-family: "Cormorant Garamond", serif; font-size: 0.9rem; font-style: italic; color: var(--ink); line-height: 1.55; padding-left: 0.75rem; border-left: 2px solid var(--accent); margin-bottom: 0.6rem; display: none; }
  .ai-narrative.visible { display: block; animation: fadeUp 0.3s ease; }
  .ai-reset { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; display: none; }
  .ai-reset.visible { display: inline-block; } .ai-reset:hover { color: var(--ink); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(26,24,20,0.92); z-index: 100; align-items: center; justify-content: center; padding: 2rem; }
  .lightbox.open { display: flex; }
  .lightbox-inner { max-width: 680px; width: 100%; animation: fadeUp 0.3s ease; }
  .lightbox img { width: 100%; max-height: 75vh; object-fit: contain; display: block; }
  .lightbox-desc { font-family: "Cormorant Garamond", serif; font-size: 0.95rem; color: rgba(255,255,255,0.6); margin-top: 1rem; font-style: italic; letter-spacing: 0.04em; }
  .lightbox-close { position: fixed; top: 1.5rem; right: 1.5rem; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.5rem; cursor: pointer; }
  .lightbox-close:hover { color: white; }
</style>
</head>
<body>

<header>
  <span class="site-name">Unhurried</span>
  <div class="header-bottom">
    <span class="site-tagline">Evan Lai &mdash; Photography</span>
    <span class="site-quote">&ldquo;I photograph the things people walk past without stopping.&rdquo;</span>
  </div>
</header>

<section class="grid-section">
  <div class="photo-grid" id="mainGrid"></div>
</section>

<div class="ai-widget" id="aiWidget">
  <div class="ai-bubble" id="aiBubble" onclick="toggleWidget()">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </div>
  <div class="ai-panel">
    <p class="ai-panel-label">Find a feeling</p>
    <div class="ai-input-row">
      <input class="ai-input" id="aiInput" type="text" placeholder="how are you feeling right now?" maxlength="120" />
      <button class="ai-submit" id="aiSubmit" onclick="handlePrompt()" title="Show me">&#8594;</button>
    </div>
    <div class="ai-pills">
      <span class="ai-pill" onclick="tryPrompt(this)">calm and far away</span>
      <span class="ai-pill" onclick="tryPrompt(this)">city life, moving slowly</span>
      <span class="ai-pill" onclick="tryPrompt(this)">something sacred</span>
      <span class="ai-pill" onclick="tryPrompt(this)">I need fresh air</span>
      <span class="ai-pill" onclick="tryPrompt(this)">nostalgic, like a memory</span>
    </div>
    <div class="ai-loading" id="aiLoading">finding the right frames&hellip;</div>
    <p class="ai-narrative" id="aiNarrative"></p>
    <button class="ai-reset" id="aiReset" onclick="resetGrid()">&#8592; show all photos</button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
  <div class="lightbox-inner">
    <img id="lightboxImg" src="" alt="" />
    <p class="lightbox-desc" id="lightboxDesc"></p>
  </div>
</div>

const layouts = ["wide", "", "tall", "", "", "wide", "", "", "tall", "", "", "", "wide", "", "tall", "", "", "wide", "", "", "tall", "", "", "", "wide", "", "tall", "", "", "wide", "", "", "tall", "", "", "", "wide", "", "tall", "", "", "wide", "", "", "tall", "", "", ""];

const grid = document.getElementById("mainGrid");
PHOTOS.forEach((p, i) => {
  const div = document.createElement("div");
  const cls = layouts[i] || "";
  div.className = "grid-item" + (cls ? " " + cls : "");
  div.innerHTML = `<img src="${p.src}" alt="${p.desc}" loading="lazy" />`;
  div.onclick = () => openLightbox(p);
  grid.appendChild(div);
});

let originalGridHTML = null;

function toggleWidget() {
  document.getElementById("aiWidget").classList.toggle("open");
}

function tryPrompt(el) { document.getElementById("aiInput").value = el.textContent.trim(); handlePrompt(); }

async function handlePrompt() {
  const input = document.getElementById("aiInput").value.trim();
  if (!input) return;
  document.getElementById("aiSubmit").disabled = true;
  document.getElementById("aiLoading").classList.add("visible");
  document.getElementById("aiNarrative").classList.remove("visible");
  document.getElementById("aiReset").classList.remove("visible");
  const photoDescriptions = PHOTOS.map((p, i) => `Photo ${i}: ${p.desc} [tags: ${p.tags.join(", ")}]`).join("\n");
  const prompt = `You are a poetic photo curator for a travel and street photographer named Evan.
You have 48 photos available. Given a visitor mood or feeling, select exactly 3 photos that best match,
and write one evocative sentence (max 25 words) explaining the selection.
Respond ONLY with valid JSON, no markdown:
{"narrative": "...", "indices": [n, n, n], "captions": ["...", "...", "..."]}
Photos:
${photoDescriptions}
Visitor feeling: "${input}"`;
  try {
    const res = await fetch("https://long-fire-d2e9.evanl60261.workers.dev", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    const text = data.text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(text);
    document.getElementById("aiNarrative").textContent = parsed.narrative;
    document.getElementById("aiNarrative").classList.add("visible");
    document.getElementById("aiReset").classList.add("visible");
    const mainGrid = document.getElementById("mainGrid");
    if (originalGridHTML === null) originalGridHTML = mainGrid.innerHTML;
    mainGrid.innerHTML = "";
    parsed.indices.forEach((idx) => {
      const photo = PHOTOS[idx];
      const div = document.createElement("div");
      div.className = "grid-item revealed";
      div.innerHTML = `<img src="${photo.src}" alt="${photo.desc}" />`;
      div.onclick = () => openLightbox(photo);
      mainGrid.appendChild(div);
    });
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch(e) {
    document.getElementById("aiNarrative").textContent = "Something went quiet. Try again.";
    document.getElementById("aiNarrative").classList.add("visible");
  }
  document.getElementById("aiLoading").classList.remove("visible");
  document.getElementById("aiSubmit").disabled = false;
}

function resetGrid() {
  if (originalGridHTML === null) return;
  document.getElementById("mainGrid").innerHTML = originalGridHTML;
  originalGridHTML = null;
  document.getElementById("aiNarrative").classList.remove("visible");
  document.getElementById("aiReset").classList.remove("visible");
  document.getElementById("aiInput").value = "";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("aiInput").addEventListener("keydown", e => { if (e.key === "Enter") handlePrompt(); });

function openLightbox(photo) {
  document.getElementById("lightboxImg").src = photo.src;
  document.getElementById("lightboxDesc").textContent = photo.desc;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox(e) {
  if (!e || e.target === document.getElementById("lightbox") || e.target.classList.contains("lightbox-close"))
    document.getElementById("lightbox").classList.remove("open");
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add("revealed"), parseInt(entry.target.dataset.delay) || 0);
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: "0px 0px -40px 0px" });

setTimeout(() => {
  document.querySelectorAll(".grid-item").forEach((el, i) => {
    el.dataset.delay = (i % 3) * 100;
    revealObserver.observe(el);
  });
}, 100);
</script>
</body>
